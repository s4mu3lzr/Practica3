<div class="mi-sidebar">
  <div style="text-align: center; margin-bottom: 2rem;">
    <i class="pi pi-box" style="font-size: 2.5rem; color: var(--primary-color);"></i>
    <h3 style="color: var(--text-color); margin-top: 10px;">ERP System</h3>
  </div>

  <div style="display: flex; flex-direction: column; gap: 10px; height: 100%;">
    <p-button label="Inicio" icon="pi pi-home" routerLink="/home" styleClass="p-button-text"
      [style]="{'width': '100%', 'text-align': 'left'}"></p-button>
    <p-button label="Grupos" icon="pi pi-users" routerLink="/group" styleClass="p-button-text"
      [style]="{'width': '100%', 'text-align': 'left'}"></p-button>
    <p-button label="Usuario" icon="pi pi-user" routerLink="/user" styleClass="p-button-text"
      [style]="{'width': '100%', 'text-align': 'left'}"></p-button>

    <p-button *ngIf="securityService.hasPermission('user:crud')" label="Admin Usuarios" icon="pi pi-shield"
      routerLink="/admin/users" styleClass="p-button-text"
      [style]="{'width': '100%', 'text-align': 'left', 'color': 'var(--primary-color)'}"></p-button>

    <div style="flex-grow: 1;"></div>

    <div style="text-align: center; margin-bottom: 10px;">
      <span style="color: var(--text-color-secondary); font-size: 0.8rem;">Versión App (v1.0.0)</span>
    </div>

    <p-button label="Cerrar Sesión" icon="pi pi-sign-out" severity="danger" styleClass="p-button-outlined"
      [style]="{'width': '100%'}" (onClick)="logout()"></p-button>
  </div>
</div>
