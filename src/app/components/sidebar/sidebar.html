<nav class="sidebar">

  <!-- ── Logo / Brand ── -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <i class="pi pi-box"></i>
    </div>
    <div class="brand-text">
      <span class="brand-name">ERP System</span>
      <span class="brand-tag">Pro v1.0</span>
    </div>
  </div>

  <!-- ── Nav Links ── -->
  <div class="sidebar-menu">
    <p class="menu-label">Navegación</p>

    <a routerLink="/home" routerLinkActive="nav-active" class="nav-item">
      <span class="nav-icon"><i class="pi pi-home"></i></span>
      <span class="nav-label">Inicio</span>
    </a>

    <a routerLink="/group" routerLinkActive="nav-active" class="nav-item">
      <span class="nav-icon"><i class="pi pi-users"></i></span>
      <span class="nav-label">Grupos</span>
    </a>

    <a routerLink="/user" routerLinkActive="nav-active" class="nav-item">
      <span class="nav-icon"><i class="pi pi-user"></i></span>
      <span class="nav-label">Mi Perfil</span>
    </a>

    <ng-container *ngIf="securityService.hasPermission('user:crud')">
      <p class="menu-label" style="margin-top:1.25rem;">Administración</p>
      <a routerLink="/admin/users" routerLinkActive="nav-active" class="nav-item nav-item--admin">
        <span class="nav-icon"><i class="pi pi-shield"></i></span>
        <span class="nav-label">Gestión de Usuarios</span>
      </a>
    </ng-container>
  </div>

  <!-- ── Bottom: User + Logout ── -->
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar">
        {{ (securityService.getCurrentUser()?.name || 'U').charAt(0).toUpperCase() }}
      </div>
      <div class="user-info">
        <span class="user-name">{{ securityService.getCurrentUser()?.name || 'Usuario' }}</span>
        <span class="user-email">{{ securityService.getCurrentUser()?.email || '' }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
      <i class="pi pi-sign-out"></i>
    </button>
  </div>

</nav>
