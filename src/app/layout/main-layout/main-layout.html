<div style="display: flex; min-height: 100vh; background-color: var(--surface-ground);">
    <app-sidebar></app-sidebar>

    <div style="flex-grow: 1; margin-left: 260px; display: flex; flex-direction: column;">
      
        <div
            style="height: 70px; background-color: var(--surface-card); border-bottom: 1px solid var(--surface-border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); z-index: 10;">
           
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <h2 style="margin: 0; font-size: 1.25rem; font-weight: 600; color: var(--text-color);">Panel de Control
                </h2>
                <i class="pi pi-angle-right" style="color: var(--text-color-secondary);"></i>
                <span style="color: var(--primary-color); font-weight: 500;">General</span>
            </div>

          
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <!-- Iconos de acción interactivos -->
                <i class="pi pi-search"
                    style="font-size: 1.2rem; cursor: pointer; color: var(--text-color-secondary); transition: color 0.2s, transform 0.2s;"
                    onmouseover="this.style.color='var(--primary-color)'; this.style.transform='scale(1.1)';"
                    onmouseout="this.style.color='var(--text-color-secondary)'; this.style.transform='scale(1)';"></i>
                <i class="pi pi-bell"
                    style="font-size: 1.2rem; cursor: pointer; color: var(--text-color-secondary); transition: color 0.2s, transform 0.2s;"
                    onmouseover="this.style.color='var(--primary-color)'; this.style.transform='scale(1.1)';"
                    onmouseout="this.style.color='var(--text-color-secondary)'; this.style.transform='scale(1)';"></i>
                <i class="pi pi-cog"
                    style="font-size: 1.2rem; cursor: pointer; color: var(--text-color-secondary); transition: color 0.2s; transition: transform 0.5s;"
                    onmouseover="this.style.transform='rotate(90deg)'; this.style.color='var(--primary-color)';"
                    onmouseout="this.style.transform='rotate(0deg)'; this.style.color='var(--text-color-secondary)';"></i>

                <div style="width: 1px; height: 2rem; background-color: var(--surface-border);"></div>

                <div style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; transition: transform 0.2s;"
                    onmouseover="this.style.transform='scale(1.05)';" onmouseout="this.style.transform='scale(1)';">
                    <div
                        style="width: 2.5rem; height: 2.5rem; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), var(--primary-color-text)); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        U
                    </div>
                </div>
            </div>
        </div>

    
        <div style="padding: 2rem; flex-grow: 1; overflow-y: auto;">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
