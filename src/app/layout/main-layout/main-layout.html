<div class="app-shell">

    <!-- ── Fixed Sidebar ── -->
    <app-sidebar></app-sidebar>

    <!-- ── Main Content Area ── -->
    <div class="app-content">

        <!-- ── Top Navbar ── -->
        <header class="topbar">
            <div class="topbar-left">
                <div class="breadcrumb">
                    <i class="pi pi-th-large breadcrumb-icon"></i>
                    <span class="breadcrumb-text">Panel de Control</span>
                </div>
            </div>

            <div class="topbar-right">
                <!-- Bell notification -->
                <button class="topbar-icon-btn" title="Notificaciones">
                    <i class="pi pi-bell"></i>
                    <span class="notif-dot"></span>
                </button>

                <!-- Settings -->
                <button class="topbar-icon-btn topbar-icon-spin" title="Configuración">
                    <i class="pi pi-cog"></i>
                </button>

                <!-- Divider -->
                <div class="topbar-divider"></div>

                <!-- User chip -->
                <div class="topbar-user">
                    <div class="topbar-avatar">
                        {{ (currentUserInitial) }}
                    </div>
                    <div class="topbar-user-info">
                        <span class="topbar-user-name">{{ currentUserName }}</span>
                        <span class="topbar-user-role">{{ currentUserRole }}</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- ── Page Content ── -->
        <main class="app-main">
            <router-outlet></router-outlet>
        </main>

    </div>
</div>
