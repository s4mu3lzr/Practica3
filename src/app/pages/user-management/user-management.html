<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="m-3 p-4 saas-card-component" style="background-color: var(--surface-card);">
    <!-- PROTECTED VIEW -->
    <ng-container *ngIf="securityService.hasPermission('user:crud'); else noAccess">
        <div class="flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="text-3xl font-bold m-0 text-gray-800">Administración de Usuarios</h1>
                <p class="text-gray-500 m-0">Gestiona los accesos y permisos globales del sistema.</p>
            </div>
            <p-button label="Nuevo Usuario" icon="pi pi-user-plus" (onClick)="openNew()"
                styleClass="p-button-primary"></p-button>
        </div>

        <p-table [value]="users" [paginator]="true" [rows]="10" responsiveLayout="scroll" [rowHover]="true"
            styleClass="p-datatable-sm">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 25%">Nombre</th>
                    <th style="width: 25%">Correo</th>
                    <th style="width: 35%">Permisos Asignados</th>
                    <th style="width: 15%" class="text-center">Acciones</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-u>
                <tr>
                    <td class="font-medium">{{ u.name }}</td>
                    <td class="text-gray-600">{{ u.email }}</td>
                    <td>
                        <div class="flex flex-wrap gap-1">
                            <p-tag *ngFor="let perm of u.permissions" [value]="perm" [rounded]="true"
                                severity="info"></p-tag>
                            <span *ngIf="!u.permissions || u.permissions.length === 0" class="text-gray-400 text-sm">Sin
                                permisos</span>
                        </div>
                    </td>
                    <td class="text-center">
                        <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-success mr-2"
                            (click)="editUser(u)"></button>
                        <button pButton icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger"
                            (click)="deleteUser(u)"></button>
                    </td>
                </tr>
            </ng-template>
        </p-table>

        <p-dialog [(visible)]="showDialog" [style]="{width: '450px'}"
            [header]="isEditMode ? 'Editar Usuario' : 'Nuevo Usuario'" [modal]="true" class="p-fluid">
            <ng-template pTemplate="content">
                <form [formGroup]="userForm" class="mt-3">
                    <div class="field mb-3">
                        <label for="name" class="font-medium">Nombre Completo</label>
                        <input type="text" pInputText id="name" formControlName="name" />
                        <small class="p-error block"
                            *ngIf="userForm.get('name')?.invalid && userForm.get('name')?.touched">El nombre es
                            requerido.</small>
                    </div>

                    <div class="field mb-3">
                        <label for="email" class="font-medium">Correo Electrónico</label>
                        <input type="email" pInputText id="email" formControlName="email" />
                        <small class="p-error block"
                            *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">Correo
                            inválido.</small>
                    </div>

                    <div class="field mb-3">
                        <label for="permissions" class="font-medium block mb-2">Permisos del Sistema</label>
                        <p-multiSelect [options]="availablePermissions" formControlName="permissions"
                            defaultLabel="Seleccionar permisos" optionLabel="label" optionValue="value" display="chip"
                            appendTo="body" styleClass="w-full"></p-multiSelect>
                    </div>
                </form>
            </ng-template>
            <ng-template pTemplate="footer">
                <button pButton label="Cancelar" icon="pi pi-times" class="p-button-text p-button-secondary"
                    (click)="hideDialog()"></button>
                <button pButton label="Guardar" icon="pi pi-check" class="p-button-primary"
                    (click)="saveUser()"></button>
            </ng-template>
        </p-dialog>
    </ng-container>

    <ng-template #noAccess>
        <div class="text-center py-6">
            <i class="pi pi-lock text-6xl text-red-400 mb-4"></i>
            <h2 class="text-2xl text-gray-800 font-bold mb-2">Acceso Denegado</h2>
            <p class="text-gray-500 max-w-20rem mx-auto">No tienes los permisos requeridos (user:crud) para acceder a
                este módulo.</p>
            <button pButton label="Volver al Inicio" icon="pi pi-home" routerLink="/home"
                class="mt-4 p-button-outlined"></button>
        </div>
    </ng-template>
</div>
