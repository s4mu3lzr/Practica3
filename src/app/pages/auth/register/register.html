<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--surface-ground); padding: 20px;">
  
  <p-toast></p-toast>

  <div style="background: var(--surface-card); padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px;">
    
    <div style="text-align: center; margin-bottom: 2rem;">
      <h2 style="margin: 0; color: var(--text-color);">Crear Cuenta</h2>
      <p style="color: var(--text-color-secondary); margin-top: 5px;">Completa el formulario</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; gap: 1.2rem;">
      
      <div class="field">
        <label class="block mb-2">Nombre Completo</label>
        <input pInputText formControlName="fullName" placeholder="Juan Pérez" class="w-full" style="width: 100%;" />
      </div>

      <div style="display: flex; gap: 10px;">
        <div style="flex: 2;">
          <label class="block mb-2">Usuario</label>
          <input pInputText formControlName="username" placeholder="juanp" style="width: 100%;" />
        </div>
        <div style="flex: 1;">
          <label class="block mb-2">Edad</label>
          <input pInputText type="number" formControlName="age" placeholder="18+" style="width: 100%;" />
          <small *ngIf="registerForm.get('age')?.invalid && registerForm.get('age')?.touched" style="color: red; display: block;">
            Solo +18
          </small>
        </div>
      </div>

      <div class="field">
        <label class="block mb-2">Dirección</label>
        <input pInputText formControlName="address" placeholder="Av. Siempre Viva 123" style="width: 100%;" />
      </div>

      <div class="field">
        <label class="block mb-2">Teléfono (Solo números)</label>
        <input pInputText formControlName="phone" placeholder="5512345678" style="width: 100%;" />
        <small *ngIf="registerForm.get('phone')?.errors?.['pattern']" style="color: red;">Solo se permiten números</small>
      </div>

      <div class="field">
        <label class="block mb-2">Correo Electrónico</label>
        <input pInputText type="email" formControlName="email" placeholder="ejemplo@correo.com" style="width: 100%;" />
      </div>

      <div class="field">
        <label class="block mb-2">Contraseña (Mín 10 chars + símbolo)</label>
        <p-password formControlName="password" [toggleMask]="true" [feedback]="true" placeholder="********" styleClass="w-full" [style]="{'width':'100%'}"></p-password>
        <small *ngIf="registerForm.get('password')?.errors?.['minlength']" style="color: red; display: block;">Mínimo 10 caracteres.</small>
        <small *ngIf="registerForm.get('password')?.errors?.['pattern']" style="color: red; display: block;">Falta un símbolo especial ($, %, &, etc).</small>
      </div>

      <div class="field">
        <label class="block mb-2">Confirmar Contraseña</label>
        <input pInputText type="password" formControlName="confirmPassword" placeholder="********" style="width: 100%;" />
        <small *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" style="color: red;">
          Las contraseñas no coinciden.
        </small>
      </div>

      <p-button label="Registrarme" icon="pi pi-check" type="submit" 
                [disabled]="registerForm.invalid" 
                [style]="{'width': '100%', 'margin-top': '10px'}">
      </p-button>

    </form>

    <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem;">
      <span style="color: var(--text-color-secondary);">¿Ya tienes una cuenta? </span>
      <a routerLink="/auth/login" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Inicia sesión</a>
    </div>

  </div>
</div>
