<div class="auth-container">
  <p-toast></p-toast>

  <div class="auth-card max-w-lg shadow-4 border-round-2xl mx-auto">
    
    <div class="auth-header">
      <div class="logo-circle">
        <i class="pi pi-user-plus logo-icon"></i>
      </div>
      <h2 class="auth-title">Crear Cuenta</h2>
      <p class="auth-subtitle">Completa el formulario para unirte al ERP</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="p-fluid">
      
      <div class="field mb-4">
        <label for="fullName">Nombre Completo</label>
        <input pInputText id="fullName" formControlName="fullName" placeholder="Ej. Juan Pérez" />
        <small class="p-error block" *ngIf="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched">Requerido.</small>
      </div>

      <div class="formgrid grid mb-4">
        <div class="field col-12 md:col-6 mb-0">
          <label for="username">Usuario</label>
          <input pInputText id="username" formControlName="username" placeholder="juanp" />
          <small class="p-error block" *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">Requerido.</small>
        </div>
        
        <div class="field col-12 md:col-6 mb-0">
          <label for="dob">Fecha de Nacimiento</label>
          <p-datepicker id="dob" formControlName="dob" [showIcon]="true" dateFormat="dd/mm/yy" appendTo="body"></p-datepicker>
          <small class="p-error block" *ngIf="registerForm.get('dob')?.hasError('required') && registerForm.get('dob')?.touched">Requerida.</small>
          <small class="p-error block" *ngIf="registerForm.get('dob')?.hasError('underaged') && registerForm.get('dob')?.touched">Debes ser mayor de 18 años.</small>
        </div>
      </div>

      <div class="formgrid grid mb-4">
        <div class="field col-12 md:col-6 mb-0">
          <label for="phone">Teléfono (10 dígitos)</label>
          <input pInputText id="phone" formControlName="phone" placeholder="5512345678" />
          <small class="p-error block" *ngIf="registerForm.get('phone')?.errors?.['pattern']">Solo números permitidos.</small>
        </div>
        <div class="field col-12 md:col-6 mb-0">
          <label for="email">Correo Electrónico</label>
          <input pInputText type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com" />
        </div>
      </div>

      <div class="field mb-4">
        <label for="address">Dirección</label>
        <input pInputText id="address" formControlName="address" placeholder="Av. Siempre Viva 123" />
      </div>

      <div class="formgrid grid mb-4">
        <div class="field col-12 md:col-6 mb-0">
          <label for="password">Contraseña</label>
          <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="true" placeholder="********"></p-password>
          <small class="p-error block" *ngIf="registerForm.get('password')?.errors?.['minlength']">Mínimo 10 caracteres.</small>
          <small class="p-error block" *ngIf="registerForm.get('password')?.errors?.['pattern']">Falta un símbolo especial.</small>
        </div>
        <div class="field col-12 md:col-6 mb-0">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <p-password id="confirmPassword" formControlName="confirmPassword" [toggleMask]="true" [feedback]="false" placeholder="********"></p-password>
          <small class="p-error block" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched">No coinciden.</small>
        </div>
      </div>

      <p-button label="Registrarme" icon="pi pi-check" type="submit" [disabled]="registerForm.invalid" styleClass="w-full mt-3 p-button-lg p-button-rounded"></p-button>
    </form>

    <div class="text-center mt-4">
      <span class="text-600">¿Ya tienes una cuenta? </span>
      <a routerLink="/auth/login" class="font-medium text-primary no-underline hover:underline transition-colors transition-duration-150">Inicia sesión</a>
    </div>

  </div>
</div>
